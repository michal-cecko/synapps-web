# CI pipeline: build the Nuxt image in GitHub Actions and deploy by pull.
# The `nuxt build` inside the image is the compile gate — a broken build never
# pushes an image, so the running container is never replaced by a bad one.
name: CI

on:
  push:
    branches: [main]

jobs:
  build-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/michal-cecko/synapps-web:latest
            ghcr.io/michal-cecko/synapps-web:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Pin app to the new image and deploy (pull, no host build)
        env:
          API: ${{ secrets.DOKPLOY_URL }}
          KEY: ${{ secrets.DOKPLOY_API_KEY }}
          IMG: ghcr.io/michal-cecko/synapps-web:sha-${{ github.sha }}
        run: |
          set -e
          APP=-M605Anf5dCmzv-n4WlY0
          curl -sf -X POST -H "x-api-key: $KEY" -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"$APP\",\"dockerImage\":\"$IMG\"}" \
            "$API/api/application.update" > /dev/null
          curl -sf -X POST -H "x-api-key: $KEY" -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"$APP\"}" \
            "$API/api/application.deploy" > /dev/null
          echo "deployed $APP -> $IMG"

  notify:
    needs: [build-image, deploy]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram on failure
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ CI failed on ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
